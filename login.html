<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login | UW SmartMeals</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="sighup-body">
    <header class="header">
      <a href="index.html" class="logo">UW SmartMeals</a>
    </header>

    <main class="signup-page">
      <section class="signup-container">
        <h2>Welcome back</h2>

        <form id="signupForm" class="signup-form">
          <div class="form-group">
            <label for="loginUsername">WiscID or Username</label>
            <input
              type="text"
              id="loginUsername"
              name="loginUsername"
              placeholder="WiscID or username"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="loginPassword"
              placeholder="password"
              required
            />
          </div>
          <button type="submit" class="primary-btn btn">Log in</button>
          <p class="login-link">
            Don't have an account? <a href="signup.html">Sign up</a>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
