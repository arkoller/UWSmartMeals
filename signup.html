<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | UW SmartMeals</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="signup-body">
    <header class="header">
      <a href="index.html" class="logo">UW SmartMeals</a>
    </header>

    <main class="signup-page">
      <section class="signup-container">
        <h2>Create an Account</h2>
        <form id="signupForm" class="signup-form">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                name="firstName"
                placeholder="first name"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="last name"
              required
            />
          </div>
          <div class="form-group">
            <label for="username">WiscID / Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter WiscID or username"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">UW Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="name@wisc.edu"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter password"
                required
              />
            </div>
          </div>
          <button type="submit" class="primary-btn">Sign Up</button>
          <p class="login-link">
            Already have an account?
            <a href="login.html">Log in</a>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
